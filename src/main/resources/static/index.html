<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Post Performance Report</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #e2e8f0; --muted: #94a3b8; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
               background: var(--bg); color: var(--text); padding: 2rem; }
        .wrap { max-width: 880px; margin: 0 auto; }
        h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
        .sub { color: var(--muted); margin-bottom: 1.5rem; }
        .card { background: var(--card); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
        .card h2 { font-size: 1.05rem; margin: 0 0 1rem; color: var(--accent); }
        .summary { line-height: 1.5; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid #334155; font-size: 0.92rem; }
        th { color: var(--muted); font-weight: 600; }
        .msg { max-width: 380px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
        .bar-label { width: 110px; color: var(--muted); font-size: 0.88rem; }
        .bar-track { flex: 1; background: #334155; border-radius: 6px; overflow: hidden; height: 18px; }
        .bar-fill { background: var(--accent); height: 100%; }
        .bar-val { width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
        .best { color: #4ade80; font-weight: 600; }
        .notice { background: #422006; border: 1px solid #b45309; color: #fbbf24;
                  border-radius: 8px; padding: 0.6rem 0.9rem; margin-bottom: 1.25rem; font-size: 0.9rem; }
        button { background: var(--accent); border: none; color: #0f172a; padding: 0.5rem 1rem;
                 border-radius: 8px; font-weight: 600; cursor: pointer; }
        .error { color: #f87171; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Meta Post Performance Report</h1>
    <div class="sub">Engagement analysis of the last 20 posts via the Meta Graph API</div>
    <div id="content">Loading report…</div>
    <button onclick="load()" style="margin-top:1rem">Refresh</button>
</div>

<script>
    const DAYS = ['MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY', 'SUNDAY'];

    function esc(s) {
        return (s ?? '').toString().replace(/[&<>"]/g, c =>
            ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    function render(report) {
        const top = (report.topPosts || []).map((p, i) => `
            <tr>
                <td>${i + 1}</td>
                <td class="msg" title="${esc(p.message)}">${esc(p.message) || '<em>(no text)</em>'}</td>
                <td>${(p.createdTime || '').slice(0, 10)}</td>
                <td>${p.totalLikes ?? 0}</td>
                <td>${p.totalComments ?? 0}</td>
                <td><strong>${p.engagementScore ?? 0}</strong></td>
            </tr>`).join('');

        const likesByDay = report.likesByDay || {};
        const best = report.bestDaysForLikes || [];
        const max = Math.max(1, ...Object.values(likesByDay));
        const bars = DAYS.map(day => {
            const val = likesByDay[day] || 0;
            const pct = (val / max) * 100;
            const isBest = best.includes(day);
            return `<div class="bar-row">
                <div class="bar-label ${isBest ? 'best' : ''}">${day[0] + day.slice(1).toLowerCase()}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                <div class="bar-val ${isBest ? 'best' : ''}">${val}</div>
            </div>`;
        }).join('');

        const sampleNotice = report.dataSource === 'sample'
            ? `<div class="notice">⚠️ Showing <strong>sample data</strong> — the live Meta Graph API returned no posts
               (e.g. an empty or unavailable Page). Configure a valid token and an active Page to see live results.</div>`
            : '';

        document.getElementById('content').innerHTML = `
            ${sampleNotice}
            <div class="card"><h2>Summary</h2><div class="summary">${esc(report.summary)}</div></div>
            <div class="card">
                <h2>Top 3 Posts by Engagement</h2>
                <table>
                    <thead><tr><th>#</th><th>Post</th><th>Date</th><th>Likes</th><th>Comments</th><th>Score</th></tr></thead>
                    <tbody>${top || '<tr><td colspan="6">No posts.</td></tr>'}</tbody>
                </table>
            </div>
            <div class="card">
                <h2>Likes by Day of Week ${best.length ? `· best: <span class="best">${best.join(', ')}</span>` : ''}</h2>
                ${bars}
            </div>`;
    }

    async function load() {
        const el = document.getElementById('content');
        el.textContent = 'Loading report…';
        try {
            const res = await fetch('/api/report');
            const body = await res.json();
            if (!res.ok) throw new Error(body.error || ('HTTP ' + res.status));
            render(body);
        } catch (e) {
            el.innerHTML = `<div class="card error">Failed to load report: ${esc(e.message)}</div>`;
        }
    }

    load();
</script>
</body>
</html>
